<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets Coming Soon - FS Business Forum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a252f 0%, #0f1419 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .logo {
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #C6A963 0%, #f4e4c1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: transparent;
            border: 2px solid #C6A963;
            color: #C6A963;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #C6A963;
            color: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(198, 169, 99, 0.3);
        }

        .countdown {
            margin: 2rem 0;
            padding: 2rem;
            background: rgba(198, 169, 99, 0.1);
            border: 1px solid rgba(198, 169, 99, 0.3);
            border-radius: 10px;
        }

        .countdown h3 {
            color: #C6A963;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h2 style="font-size: 1.5rem; color: #C6A963; letter-spacing: 0.1em;">FS BUSINESS FORUM</h2>
        </div>

        <h1>Tickets Launching Soon...</h1>
        
        <p>
            We're preparing an exceptional experience for you. 
            Ticket sales will open shortly. Stay tuned!
        </p>

        <div class="countdown">
            <h3>COMING SOON</h3>
            <p style="margin: 0; color: #ffffff;">Check back in a few days for updates</p>
        </div>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</body>
</html>
